name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: brew install swiftlint swiftgen bartycrouch

    - name: Run tests
      run: xcodebuild clean test -project Clipy.xcodeproj -scheme Clipy -verbose
